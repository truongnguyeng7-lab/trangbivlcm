<!-- ==========================================================================
     FORGOT PASSWORD POPUP – QUÊN MẬT KHẨU VIP
     Nhúng vào Dialog.html bằng: <?!= include("ForgotPassword"); ?>
     ========================================================================== -->
<style>
  .forgot-vip-overlay {
    position: fixed;
    inset: 0;
    z-index: 10000080;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    font-family: 'Segoe UI', sans-serif;
  }

  .forgot-vip-card {
    width: 460px;
    max-width: calc(100vw - 32px);
    background: linear-gradient(180deg,#202020 0%,#151515 100%);
    border: 1px solid #3c3c3c;
    border-radius: 18px;
    box-shadow: 0 26px 70px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
    padding: 24px;
    color: #fff;
    animation: forgotVipPop 0.2s ease;
  }

  @keyframes forgotVipPop {
    from { transform: translateY(10px) scale(0.96); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .forgot-vip-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 18px;
  }

  .forgot-vip-kicker {
    font-size: 12px;
    color: #4cc2ff;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .forgot-vip-title {
    font-size: 22px;
    font-weight: 850;
    color: #fff;
    line-height: 1.25;
  }

  .forgot-vip-desc {
    font-size: 13px;
    color: #9a9a9a;
    margin-top: 7px;
    line-height: 1.55;
  }

  .forgot-vip-close {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: 1px solid #3d3d3d;
    background: #242424;
    color: #aaa;
    font-size: 20px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
  }

  .forgot-vip-close:hover {
    background: #333;
    color: #fff;
  }

  .forgot-vip-field {
    margin-bottom: 14px;
  }

  .forgot-vip-field label {
    display: block;
    margin-bottom: 8px;
    color: #d0d0d0;
    font-size: 13px;
    font-weight: 700;
  }

  .forgot-vip-field input {
    width: 100%;
    box-sizing: border-box;
    height: 47px;
    padding: 0 14px;
    border-radius: 11px;
    border: 1px solid #4a4a4a;
    background: #0f0f0f;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }

  .forgot-vip-field input:focus {
    border-color: #4cc2ff;
    box-shadow: 0 0 0 2px rgba(76,194,255,0.15);
    background: #121212;
  }

  .forgot-vip-note {
    margin: 4px 0 16px;
    padding: 10px 12px;
    border-radius: 11px;
    border: 1px solid rgba(76,194,255,0.22);
    background: rgba(76,194,255,0.07);
    color: #9fdfff;
    font-size: 12px;
    line-height: 1.45;
  }

  .forgot-vip-error,
  .forgot-vip-success {
    display: none;
    margin: 4px 0 14px;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.45;
  }

  .forgot-vip-error {
    color: #ff9c9c;
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.25);
  }

  .forgot-vip-success {
    color: #9ee6b2;
    background: rgba(129,201,149,0.1);
    border: 1px solid rgba(129,201,149,0.25);
  }

  .forgot-vip-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .forgot-vip-btn {
    height: 42px;
    min-width: 108px;
    border-radius: 10px;
    border: 1px solid transparent;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: 0.2s;
  }

  .forgot-vip-btn.secondary {
    background: #2d2d2d;
    color: #ccc;
    border-color: #4a4a4a;
  }

  .forgot-vip-btn.secondary:hover {
    background: #3a3a3a;
    color: #fff;
  }

  .forgot-vip-btn.primary {
    min-width: 170px;
    background: #0078d4;
    color: #fff;
    border-color: #0078d4;
    box-shadow: 0 3px 12px rgba(0,120,212,0.24);
  }

  .forgot-vip-btn.primary:hover {
    background: #0063b1;
  }

  .forgot-vip-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
</style>

<div id="forgotVipPopup" class="forgot-vip-overlay">
  <div class="forgot-vip-card" role="dialog" aria-modal="true" aria-labelledby="forgotVipTitle">
    <div class="forgot-vip-header">
      <div>
        <div class="forgot-vip-kicker">Tài khoản VIP</div>
        <div id="forgotVipTitle" class="forgot-vip-title">Quên mật khẩu VIP</div>
        <div class="forgot-vip-desc">
          Nhập email đã đăng ký VIP. Hệ thống sẽ cấp lại mật khẩu mới và gửi về email của bạn.
        </div>
      </div>
      <button type="button" class="forgot-vip-close" onclick="closeForgotVipPopup()">×</button>
    </div>

    <div class="forgot-vip-field">
      <label for="forgotVipEmail">Địa chỉ email đăng ký VIP</label>
      <input id="forgotVipEmail" type="email" placeholder="Ví dụ: abc@gmail.com" autocomplete="email" onkeydown="if(event.key==='Enter') submitForgotVipPassword()">
    </div>

    <div class="forgot-vip-note">
      Bạn sẽ nhận được mật khẩu mới trong email bạn đã đăng ký.
    </div>

    <div id="forgotVipError" class="forgot-vip-error"></div>
    <div id="forgotVipSuccess" class="forgot-vip-success"></div>

    <div class="forgot-vip-actions">
      <button type="button" class="forgot-vip-btn secondary" onclick="closeForgotVipPopup()">Hủy</button>
      <button id="forgotVipSubmitBtn" type="button" class="forgot-vip-btn primary" onclick="submitForgotVipPassword()">Cấp lại mật khẩu mới</button>
    </div>
  </div>
</div>

<script>
  window.openForgotVipPopup = function() {
    const popup = document.getElementById("forgotVipPopup");
    const emailInput = document.getElementById("forgotVipEmail");
    const errorBox = document.getElementById("forgotVipError");
    const successBox = document.getElementById("forgotVipSuccess");

    if (errorBox) {
      errorBox.style.display = "none";
      errorBox.innerText = "";
    }

    if (successBox) {
      successBox.style.display = "none";
      successBox.innerText = "";
    }

    const knownEmail =
      localStorage.getItem("vlcm_user_email") ||
      document.getElementById("vipLoginEmail")?.value ||
      "";

    if (emailInput) {
      emailInput.value = knownEmail;
    }

    if (popup) popup.style.display = "flex";

    setTimeout(() => {
      if (emailInput) emailInput.focus();
    }, 60);
  };

  window.closeForgotVipPopup = function() {
    const popup = document.getElementById("forgotVipPopup");
    if (popup) popup.style.display = "none";
  };

  window.submitForgotVipPassword = function() {
    const emailInput = document.getElementById("forgotVipEmail");
    const errorBox = document.getElementById("forgotVipError");
    const successBox = document.getElementById("forgotVipSuccess");
    const btn = document.getElementById("forgotVipSubmitBtn");

    const email = (emailInput?.value || "").trim();

    if (errorBox) {
      errorBox.style.display = "none";
      errorBox.innerText = "";
    }

    if (successBox) {
      successBox.style.display = "none";
      successBox.innerText = "";
    }

    if (!email || !email.includes("@")) {
      if (errorBox) {
        errorBox.innerText = "Vui lòng nhập địa chỉ email hợp lệ.";
        errorBox.style.display = "block";
      }
      if (emailInput) emailInput.focus();
      return;
    }

    if (btn) {
      btn.disabled = true;
      btn.innerText = "Đang xử lý...";
    }

    google.script.run
      .withSuccessHandler(res => {
        if (btn) {
          btn.disabled = false;
          btn.innerText = "Cấp lại mật khẩu mới";
        }

        if (res && res.ok) {
          if (successBox) {
            successBox.innerText = res.message || "Đã gửi mật khẩu mới về email của bạn.";
            successBox.style.display = "block";
          }

          if (typeof showModernAlert === "function") {
            showModernAlert("✅ Đã gửi mật khẩu mới về email.");
          }

          setTimeout(() => {
            closeForgotVipPopup();
          }, 1200);

          return;
        }

        if (res && res.code === "NOT_REGISTERED") {
  if (errorBox) {
    errorBox.innerText = res.message || "Tài khoản chưa đăng ký VIP.";
    errorBox.style.display = "block";
  }

  if (typeof showModernAlert === "function") {
    showModernAlert("⚠️ Tài khoản chưa đăng ký. Đang chuyển sang màn hình đăng ký...");
  }

  window.__lastCheckedVipEmail = email;

  setTimeout(() => {
    closeForgotVipPopup();

    if (typeof openVipContactPopup === "function") {
      openVipContactPopup();
    }
  }, 1200);

  return;
}

if (errorBox) {
  errorBox.innerText = (res && res.message) ? res.message : "Không thể cấp lại mật khẩu.";
  errorBox.style.display = "block";
}
      })
      .withFailureHandler(err => {
        if (btn) {
          btn.disabled = false;
          btn.innerText = "Cấp lại mật khẩu mới";
        }

        if (errorBox) {
          errorBox.innerText = "Lỗi cấp lại mật khẩu: " + (err?.message || err);
          errorBox.style.display = "block";
        }
      })
      .requestVipPasswordReset({
        email: email
      });
  };
</script>
